apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devicetrust-device-manager
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/tkalamdc/device-manager-argo.git
    targetRevision: master
    path: charts/device-manager

  destination:
    server: https://kubernetes.default.svc
    namespace: devtm

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true